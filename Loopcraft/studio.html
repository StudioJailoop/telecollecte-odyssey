<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loopcraft Studio</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy:    #1E2643;
      --navy-2:  #151C36;
      --yellow:  #FDBE00;
      --white:   #FFFFFF;
      --grey:    #F4F4F4;
      --grey-bd: #E0E0E0;
      --grey-txt:#6B7280;
      --sidebar-w: 72px;
      --panel-w:  260px;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy);
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════
       LOGIN
    ═══════════════════════════════════════ */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .icon {
      width: 80px; height: 80px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .login-logo .icon img {
      width: 80px; height: 80px;
      object-fit: contain;
    }
    .login-logo .brand {
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
    }
    .login-logo .sub {
      font-size: 12px;
      color: var(--grey-txt);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-field { margin-bottom: 14px; }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-field input {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--grey-bd);
      border-radius: 12px;
      padding: 0 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: var(--navy);
      background: #FAFAFA;
      transition: border-color 0.15s;
    }
    .login-field input:focus { border-color: var(--navy); background: #fff; }
    .login-error {
      display: none;
      font-size: 13px;
      color: #BF2F17;
      text-align: center;
      margin-bottom: 10px;
    }
    .login-error.visible { display: block; }
    .btn-login {
      width: 100%;
      height: 50px;
      background: var(--navy);
      color: var(--yellow);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: opacity 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-login:hover { opacity: 0.88; }

    /* ═══════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════ */
    #app-screen {
      display: none;
      min-height: 100vh;
    }
    #app-screen.visible {
      display: flex;
    }

    /* ── Sidebar icônes (style Discord) ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--navy-2);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 8px;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 10;
    }
    .sidebar-logo {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .sidebar-logo img {
      width: 44px; height: 44px;
      object-fit: contain;
    }
    .sidebar-sep {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 4px 0;
      flex-shrink: 0;
    }
    .sidebar-project {
      width: 44px; height: 44px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      position: relative;
      transition: border-radius 0.2s;
      flex-shrink: 0;
    }
    .sidebar-project:hover,
    .sidebar-project.active {
      border-radius: 12px;
    }
    .sidebar-project .notif-dot {
      position: absolute;
      right: -2px; top: -2px;
      width: 10px; height: 10px;
      background: #E94B4B;
      border-radius: 50%;
      border: 2px solid var(--navy-2);
      display: none;
    }
    .sidebar-project.has-notif .notif-dot { display: block; }
    .sidebar-project-tooltip {
      position: absolute;
      left: 56px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .sidebar-project:hover .sidebar-project-tooltip { opacity: 1; }

    /* bouton + ajouter projet */
    .sidebar-add {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.25);
      background: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, border-radius 0.2s;
      flex-shrink: 0;
      position: relative;
    }
    .sidebar-add:hover {
      border-color: rgba(255,255,255,0.7);
      color: #fff;
      border-radius: 14px;
    }
    .sidebar-add .sidebar-project-tooltip { left: 56px; }

    /* spacer + bottom icons */
    .sidebar-spacer { flex: 1; }
    .sidebar-bottom {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .sidebar-avatar {
      width: 36px; height: 36px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
    }

    /* ── Panel projet (liste wireframes) ── */
    .panel {
      width: var(--panel-w);
      min-height: 100vh;
      background: #1A2240;
      margin-left: var(--sidebar-w);
      position: fixed;
      left: 0; top: 0; bottom: 0;
      overflow-y: auto;
      padding: 24px 0;
      display: none;
    }
    .panel.visible { display: block; }
    .panel-header {
      padding: 0 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 8px;
    }
    .panel-project-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .panel-project-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .panel-section-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 16px 6px;
    }
    .panel-wf-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 6px;
      margin: 0 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .panel-wf-item:hover { background: rgba(255,255,255,0.06); }
    .panel-wf-item.active { background: rgba(253,190,0,0.12); }
    .panel-wf-icon { font-size: 14px; flex-shrink: 0; }
    .panel-wf-info { flex: 1; min-width: 0; }
    .panel-wf-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .panel-wf-meta { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }

    /* ── Wireframes grid dans le main ── */
    .wf-grid {
      padding: 40px 32px;
      display: none;
    }
    .wf-grid.visible { display: block; }
    .wf-grid-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .wf-grid-project-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .wf-grid-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
    }
    .wf-grid-sub {
      font-size: 13px;
      color: var(--grey-txt);
      margin-top: 2px;
    }
    .wf-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .wf-card {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid var(--grey-bd);
      padding: 20px 24px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .wf-card:hover {
      border-color: var(--navy);
      box-shadow: 0 4px 16px rgba(30,38,67,0.1);
    }
    .wf-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .wf-card-icon {
      width: 40px; height: 40px;
      background: var(--grey);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .wf-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
    }
    .wf-card-meta {
      font-size: 12px;
      color: var(--grey-txt);
      margin-top: 3px;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .status-badge.in-progress {
      background: rgba(253,190,0,0.18);
      color: var(--yellow);
    }
    .status-badge.done {
      background: rgba(34,197,94,0.15);
      color: #22C55E;
    }

    /* ── Main content ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      background: #F7F8FA;
      transition: margin-left 0.2s;
    }
    .main.with-panel {
      margin-left: calc(var(--sidebar-w) + var(--panel-w));
    }

    /* Top bar */
    .topbar {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid var(--grey-bd);
      display: flex;
      align-items: center;
      padding: 0 32px;
      justify-content: space-between;
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-notif {
      position: relative;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grey);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
    }
    .topbar-notif .badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 8px; height: 8px;
      background: #E94B4B;
      border-radius: 50%;
      border: 1.5px solid #fff;
      display: none;
    }
    .topbar-notif.has-notif .badge { display: block; }
    .btn-logout-top {
      height: 34px;
      background: none;
      border: 1.5px solid var(--grey-bd);
      border-radius: 10px;
      color: var(--grey-txt);
      font-size: 13px;
      font-weight: 600;
      padding: 0 14px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout-top:hover { border-color: var(--navy); color: var(--navy); }

    /* Dashboard */
    .dashboard {
      padding: 40px 32px;
    }
    .dash-welcome {
      font-size: 26px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .dash-date {
      font-size: 14px;
      color: var(--grey-txt);
      margin-bottom: 32px;
    }
    .dash-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .dash-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      border: 1.5px solid var(--grey-bd);
    }
    .dash-card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--grey-txt);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .dash-card-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .dash-card-sub {
      font-size: 12px;
      color: var(--grey-txt);
      margin-top: 6px;
    }
    .dash-card.highlight {
      background: var(--navy);
      border-color: var(--navy);
    }
    .dash-card.highlight .dash-card-label { color: rgba(255,255,255,0.5); }
    .dash-card.highlight .dash-card-value { color: var(--yellow); }
    .dash-card.highlight .dash-card-sub { color: rgba(255,255,255,0.4); }

    /* Messages section */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
    }
    .msg-list { display: flex; flex-direction: column; gap: 10px; }
    .msg-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      border: 1.5px solid var(--grey-bd);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .msg-item.unread { border-left: 3px solid var(--yellow); }
    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--yellow);
      flex-shrink: 0;
    }
    .msg-body { flex: 1; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .msg-author { font-size: 13px; font-weight: 700; color: var(--navy); }
    .msg-project { font-size: 11px; color: var(--grey-txt); background: var(--grey); padding: 2px 8px; border-radius: 20px; }
    .msg-time { font-size: 11px; color: var(--grey-txt); margin-left: auto; }
    .msg-text { font-size: 13px; color: #374151; line-height: 1.5; }
    .empty-msg {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      border: 1.5px dashed var(--grey-bd);
      color: var(--grey-txt);
      font-size: 14px;
    }

    /* Wireframe detail view */
    .wf-detail {
      padding: 40px 32px;
      display: none;
    }
    .wf-detail.visible { display: block; }
    .wf-detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .btn-back {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grey);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--navy);
    }
    .wf-detail-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
    }
    .wf-detail-meta {
      font-size: 13px;
      color: var(--grey-txt);
      margin-top: 2px;
    }
    .wf-detail-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1.5px solid var(--grey-bd);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .status-toggle:hover { border-color: var(--navy); }
    .btn-open-wf {
      height: 38px;
      background: var(--navy);
      color: var(--yellow);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-open-wf:hover { opacity: 0.88; }
    .wf-preview-box {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid var(--grey-bd);
      overflow: hidden;
      height: 520px;
    }
    .wf-preview-box iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><img src="./logo-jailoop.png" alt="Studio Jailoop"/></div>
      <div class="brand">Loopcraft</div>
      <div class="sub">Studio Designer</div>
    </div>
    <div class="login-field">
      <label>Identifiant</label>
      <input type="text" id="login-id" placeholder="Studio Jailoop" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="login-error" id="login-error">Identifiant ou mot de passe incorrect.</div>
    <button class="btn-login" onclick="doLogin()">Connexion</button>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app-screen">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="./logo-jailoop.png" alt="Studio Jailoop"/></div>
    <div class="sidebar-sep"></div>
    <!-- Projets injectés par JS -->
    <div id="sidebar-projects"></div>
    <!-- Bouton ajouter projet -->
    <div class="sidebar-add" onclick="addProject()" title="">
      +
      <span class="sidebar-project-tooltip">Nouveau projet</span>
    </div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-bottom">
      <div class="sidebar-avatar" title="Studio Jailoop">SJ</div>
    </div>
  </nav>

  <!-- Panel liste wireframes -->
  <aside class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-project-name" id="panel-project-name">—</div>
      <div class="panel-project-sub">Wireframes</div>
    </div>
    <div class="panel-section-label">Fichiers</div>
    <div id="panel-wf-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main" style="margin-left:var(--sidebar-w)">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <div class="topbar-notif" id="topbar-notif" title="Messages">
          🔔
          <span class="badge"></span>
        </div>
        <button class="btn-logout-top" onclick="doLogout()">Déconnexion</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <div class="dash-welcome" id="dash-welcome">Bonjour, Studio 👋</div>
      <div class="dash-date" id="dash-date"></div>

      <div class="dash-cards">
        <div class="dash-card highlight">
          <div class="dash-card-label">Projets actifs</div>
          <div class="dash-card-value" id="stat-projects">—</div>
          <div class="dash-card-sub">En cours</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-label">Wireframes</div>
          <div class="dash-card-value" id="stat-wf">—</div>
          <div class="dash-card-sub">Total créés</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-label">Nouveaux messages</div>
          <div class="dash-card-value" id="stat-msgs">—</div>
          <div class="dash-card-sub">Non lus</div>
        </div>
      </div>

    </div>

    <!-- Wireframe detail -->
    <div class="wf-detail" id="wf-detail">
      <div class="wf-detail-header">
        <button class="btn-back" onclick="closeWfDetail()">←</button>
        <div>
          <div class="wf-detail-title" id="wf-detail-title">—</div>
          <div class="wf-detail-meta" id="wf-detail-meta">—</div>
        </div>
        <div class="wf-detail-actions">
          <button class="status-toggle" id="status-toggle-btn" onclick="toggleStatus()">
            <span id="status-toggle-label">● En cours</span>
          </button>
          <button class="btn-open-wf" id="btn-open-wf" onclick="openWireframe()">Ouvrir le wireframe ↗</button>
        </div>
      </div>
      <div class="wf-preview-box">
        <iframe id="wf-iframe" src=""></iframe>
      </div>
    </div>

  </main>
</div>

<script>
// ═══════════════════════════════════════
// DATA (source : projects.json — simulé ici, prêt pour fetch)
// ═══════════════════════════════════════
const CREDENTIALS = { id: 'Studio Jailoop', pw: 'Loopcraft' };

let projects = [];
let activeProject = null;
let activeWf = null;

// Couleurs pour les projets dans la sidebar
const COLORS = ['#0057A8','#7C3AED','#059669','#DC2626','#EA580C','#0891B2'];

// ── Charger les données ──
async function loadProjects() {
  try {
    const r = await fetch('./data/projects.json');
    const d = await r.json();
    projects = d.projects;
  } catch(e) {
    // Fallback données intégrées
    projects = [
      {
        id: 'club-med',
        name: 'Club Med',
        color: '#0057A8',
        initials: 'CM',
        wireframes: [
          {
            id: 'telecollecte-cas1',
            title: 'Télécollecte Cas 1',
            version: 'V5',
            status: 'in_progress',
            file: '../wireframe-telecollecte-cas1-V5.html',
            updated: '2026-05-21'
          }
        ]
      }
    ];
  }
}

// ── Messages Firebase ──
const FB_COMMENTS_URL = 'https://studio-jailoop-default-rtdb.firebaseio.com/comments.json';
let allMessages = [];

async function loadMessages() {
  try {
    const r = await fetch(FB_COMMENTS_URL);
    const d = await r.json();
    if (d) {
      allMessages = Object.entries(d).map(([id, v]) => ({ id, ...v }))
        .sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    }
  } catch(e) { allMessages = []; }
}

// ═══════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-error');

  if (id === CREDENTIALS.id && pw === CREDENTIALS.pw) {
    err.classList.remove('visible');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('visible');
    initApp();
  } else {
    err.classList.add('visible');
    document.getElementById('login-pw').value = '';
  }
}

function doLogout() {
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
  activeProject = null;
  activeWf = null;
}

// Enter sur les champs
document.getElementById('login-id').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pw').focus(); });
document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════
async function initApp() {
  await Promise.all([loadProjects(), loadMessages()]);
  renderSidebar();
  renderDashboard();
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
// Logo Club Med SVG (soleil stylisé blanc sur fond bleu Club Med)
const PROJECT_LOGOS = {
  'club-med': `<svg viewBox="0 0 44 44" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="10" fill="white"/>
    <g fill="white">
      ${[0,45,90,135,180,225,270,315].map(a => {
        const r = a * Math.PI / 180;
        const x1 = 22 + 13 * Math.cos(r); const y1 = 22 + 13 * Math.sin(r);
        const x2 = 22 + 18 * Math.cos(r); const y2 = 22 + 18 * Math.sin(r);
        return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="white" stroke-width="3" stroke-linecap="round"/>`;
      }).join('')}
    </g>
  </svg>`
};

function renderSidebar() {
  const container = document.getElementById('sidebar-projects');
  container.innerHTML = '';
  projects.forEach((p, i) => {
    const color = p.color || COLORS[i % COLORS.length];
    const hasUnread = hasUnreadForProject(p);
    const logo = PROJECT_LOGOS[p.id];
    const inner = logo
      ? logo
      : `<span style="font-size:13px;font-weight:700;color:#fff">${p.initials || p.name.slice(0,2).toUpperCase()}</span>`;
    const el = document.createElement('div');
    el.className = 'sidebar-project' + (hasUnread ? ' has-notif' : '');
    el.style.background = color;
    el.style.overflow = 'hidden';
    el.innerHTML = `
      ${inner}
      <span class="notif-dot"></span>
      <span class="sidebar-project-tooltip">${p.name}</span>
    `;
    el.addEventListener('click', () => selectProject(p.id));
    container.appendChild(el);
  });
}

function hasUnreadForProject(p) {
  return allMessages.some(m => m.project === p.id && !m.read);
}

// ═══════════════════════════════════════
// SELECT PROJET → Panel
// ═══════════════════════════════════════
function selectProject(projectId) {
  const panel = document.getElementById('panel');
  const main = document.getElementById('main');

  // Toggle : si déjà actif et panel ouvert → fermer
  if (activeProject && activeProject.id === projectId && panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    main.style.marginLeft = 'var(--sidebar-w)';
    document.querySelectorAll('.sidebar-project').forEach(el => el.classList.remove('active'));
    activeProject = null;
    document.getElementById('topbar-title').textContent = 'Dashboard';
    return;
  }

  activeProject = projects.find(p => p.id === projectId);
  if (!activeProject) return;

  // Sidebar active state
  document.querySelectorAll('.sidebar-project').forEach((el, i) => {
    el.classList.toggle('active', projects[i]?.id === projectId);
  });

  // Ouvrir panel
  document.getElementById('panel-project-name').textContent = activeProject.name;
  renderPanelWireframes();
  panel.classList.add('visible');
  main.style.marginLeft = 'calc(var(--sidebar-w) + var(--panel-w))';

  showDashboard();
  document.getElementById('topbar-title').textContent = activeProject.name;
}

function addProject() {
  const name = prompt('Nom du nouveau projet :');
  if (!name || !name.trim()) return;
  const id = name.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  projects.push({ id, name: name.trim(), color: COLORS[projects.length % COLORS.length], initials: name.trim().slice(0,2).toUpperCase(), wireframes: [] });
  renderSidebar();
}

function renderPanelWireframes() {
  const list = document.getElementById('panel-wf-list');
  list.innerHTML = '';
  (activeProject.wireframes || []).forEach(wf => {
    const statusLabel = wf.status === 'done' ? 'Done' : 'En cours';
    const statusClass = wf.status === 'done' ? 'done' : 'in-progress';
    const el = document.createElement('div');
    el.className = 'panel-wf-item';
    el.dataset.wfId = wf.id;
    el.innerHTML = `
      <span class="panel-wf-icon">📄</span>
      <div class="panel-wf-info">
        <div class="panel-wf-title">${wf.title}</div>
        <div class="panel-wf-meta">${wf.version} · ${wf.updated}</div>
      </div>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    `;
    el.addEventListener('click', () => selectWireframe(wf.id));
    list.appendChild(el);
  });
}

// ═══════════════════════════════════════
// WIREFRAME DETAIL
// ═══════════════════════════════════════
function selectWireframe(wfId) {
  activeWf = activeProject.wireframes.find(w => w.id === wfId);
  if (!activeWf) return;

  // Panel active
  document.querySelectorAll('.panel-wf-item').forEach(el => {
    el.classList.toggle('active', el.dataset.wfId === wfId);
  });

  // Remplir le detail
  document.getElementById('wf-detail-title').textContent = activeWf.title;
  document.getElementById('wf-detail-meta').textContent = `${activeProject.name} · ${activeWf.version} · Mis à jour le ${activeWf.updated}`;
  updateStatusToggle();
  document.getElementById('wf-iframe').src = activeWf.file;
  document.getElementById('topbar-title').textContent = activeWf.title;

  // Afficher
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('wf-detail').classList.add('visible');
}

function closeWfDetail() {
  document.getElementById('wf-detail').classList.remove('visible');
  document.getElementById('dashboard').style.display = '';
  document.getElementById('topbar-title').textContent = activeProject ? activeProject.name : 'Dashboard';
  document.querySelectorAll('.panel-wf-item').forEach(el => el.classList.remove('active'));
}

function updateStatusToggle() {
  const btn = document.getElementById('status-toggle-btn');
  const label = document.getElementById('status-toggle-label');
  if (activeWf.status === 'done') {
    label.textContent = '✓ Done';
    btn.style.color = '#22C55E';
  } else {
    label.textContent = '● En cours';
    btn.style.color = '#FDBE00';
  }
}

function toggleStatus() {
  if (!activeWf) return;
  activeWf.status = activeWf.status === 'done' ? 'in_progress' : 'done';
  updateStatusToggle();
  // Mettre à jour dans le panel aussi
  renderPanelWireframes();
  // Marquer l'item actif à nouveau
  document.querySelectorAll('.panel-wf-item').forEach(el => {
    el.classList.toggle('active', el.dataset.wfId === activeWf.id);
  });
  // TODO: persister dans Firebase/JSON
}

function openWireframe() {
  if (activeWf) window.open(activeWf.file, '_blank');
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function showDashboard() {
  document.getElementById('dashboard').style.display = '';
  document.getElementById('wf-detail').classList.remove('visible');
}

function renderDashboard() {
  // Date
  const now = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('dash-date').textContent = now.toLocaleDateString('fr-FR', opts);

  // Stats
  const totalWf = projects.reduce((s, p) => s + (p.wireframes||[]).length, 0);
  const unread = allMessages.filter(m => !m.read).length;
  document.getElementById('stat-projects').textContent = projects.length;
  document.getElementById('stat-wf').textContent = totalWf;
  document.getElementById('stat-msgs').textContent = unread;

  // Notif bell
  const bell = document.getElementById('topbar-notif');
  if (unread > 0) bell.classList.add('has-notif');
}
</script>
