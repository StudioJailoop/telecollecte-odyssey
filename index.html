<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Odyssey — Wireframes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy: #1E2643;
      --yellow: #FDBE00;
      --white: #FFFFFF;
      --grey: #F4F4F4;
      --grey-bd: #E0E0E0;
      --grey-txt: #6B7280;
    }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN ── */
    #login-screen {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .trident {
      font-size: 36px;
      color: var(--yellow);
    }
    .login-logo .brand {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.5px;
    }
    .login-logo .subtitle {
      font-size: 13px;
      color: var(--grey-txt);
      margin-top: 4px;
    }
    .login-field {
      margin-bottom: 16px;
    }
    .login-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--grey-bd);
      border-radius: 100px;
      padding: 0 20px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: var(--navy);
      transition: border-color 0.15s;
    }
    .login-field input:focus { border-color: var(--navy); }
    .login-error {
      display: none;
      font-size: 13px;
      color: #BF2F17;
      text-align: center;
      margin-bottom: 12px;
    }
    .login-error.visible { display: block; }
    .btn-login {
      width: 100%;
      height: 48px;
      background: var(--yellow);
      color: #000;
      border: none;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.9; }

    /* ── PORTAIL ── */
    #portal-screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      background: var(--navy);
      flex-direction: column;
    }

    /* Header */
    .portal-header {
      background: var(--navy);
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .portal-header .logo { font-size: 20px; font-weight: 700; color: var(--yellow); }
    .portal-header .user { font-size: 13px; color: rgba(255,255,255,0.6); display:flex; align-items:center; gap:12px; }
    .btn-logout {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      padding: 5px 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-logout:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* Content */
    .portal-content {
      flex: 1;
      padding: 48px 40px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }
    .portal-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }
    .portal-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }

    /* Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .wf-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      text-decoration: none;
    }
    .wf-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .wf-card .card-tag {
      display: inline-block;
      background: var(--yellow);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .wf-card .card-tag.v1 { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
    .wf-card .card-tag.v2 { background: rgba(253,190,0,0.2); color: var(--yellow); }
    .wf-card .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .wf-card .card-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }
    .wf-card .card-arrow {
      margin-top: 20px;
      font-size: 20px;
      color: var(--yellow);
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="trident">⍣</div>
      <div class="brand">odyssey</div>
      <div class="subtitle">Wireframes — Accès restreint</div>
    </div>
    <div class="login-field">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="Votre identifiant" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="off"/>
    </div>
    <div class="login-error" id="login-error">Identifiant ou mot de passe incorrect</div>
    <button class="btn-login" onclick="doLogin()">Accéder aux wireframes →</button>
  </div>
</div>

<!-- ── PORTAIL ── -->
<div id="portal-screen">
  <header class="portal-header">
    <div class="logo">⍣ odyssey</div>
    <div class="user">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="doLogout()">Se déconnecter</button>
    </div>
  </header>
  <div class="portal-content">
    <div class="portal-title">Wireframes — Télécollecte</div>
    <div class="portal-sub">Saisie des télécollectes TPE · Club Med Odyssey</div>
    <div class="cards-grid">
      <a class="wf-card" href="wireframe-telecollecte-cas1-V3.html" target="_blank">
        <div class="card-tag">V3 — En cours</div>
        <div class="card-title">Saisie des télécollectes</div>
        <div class="card-desc">Version de travail courante — Jour J, Date antérieure, Régularisation</div>
        <div class="card-arrow">→</div>
      </a>
    </div>
  </div>
</div>

<script>
  // ── Comptes autorisés ──
  const USERS = [
    { id: 'seb',   password: 'ody26', name: 'Sébastien' },
    { id: 'julie', password: 'odyssey2026', name: 'Julie' },
    { id: 'nelly', password: 'odyssey2026', name: 'Nelly' },
    { id: 'eric',  password: 'odyssey2026', name: 'Éric' },
  ];

  // Vérifier session existante
  const saved = sessionStorage.getItem('wf_user');
  if (saved) showPortal(JSON.parse(saved));

  // Soumettre avec Entrée
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
  });

  function doLogin() {
    const id  = document.getElementById('username').value.trim().toLowerCase();
    const pwd = document.getElementById('password').value;
    const user = USERS.find(u => u.id === id && u.password === pwd);
    if (user) {
      sessionStorage.setItem('wf_user', JSON.stringify(user));
      showPortal(user);
    } else {
      document.getElementById('login-error').classList.add('visible');
      document.getElementById('password').value = '';
    }
  }

  function showPortal(user) {
    document.getElementById('login-screen').style.display = 'none';
    const portal = document.getElementById('portal-screen');
    portal.style.display = 'flex';
    document.getElementById('user-name').textContent = user.name;
    document.body.style.alignItems = 'flex-start';
  }

  function doLogout() {
    sessionStorage.removeItem('wf_user');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('portal-screen').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.body.style.alignItems = 'center';
  }
</script>
</body>
</html>
